name: C/C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: make
        run: make
      - name: make check
        run: make check
      - name: make distcheck
        run: make distcheck
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Install Make
        run: choco install make
  
      - name: Build
        run: make
  
      - name: Run tests
        run: make check
